
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ims
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic signals --partitions 6 --replication-factor 1"
    restart: "no"

  api:
    build: ./backend
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      postgres:
        condition: service_started
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4", "--backlog", "2048"]
    environment:
      IMS_ENV: "local"
      POSTGRES_DSN: "postgresql://postgres:postgres@postgres:5432/ims"
      MONGODB_URI: "mongodb://mongodb:27017/ims"
      REDIS_URL: "redis://redis:6379/0"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"

  worker:
    build: ./backend
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      postgres:
        condition: service_started
    command: ["python", "-m", "app.consumer.signal_consumer"]
    restart: on-failure
    environment:
      IMS_ENV: "local"
      POSTGRES_DSN: "postgresql://postgres:postgres@postgres:5432/ims"
      MONGODB_URI: "mongodb://mongodb:27017/ims"
      REDIS_URL: "redis://redis:6379/0"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"

  frontend:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  pgdata:
  mongodata:
